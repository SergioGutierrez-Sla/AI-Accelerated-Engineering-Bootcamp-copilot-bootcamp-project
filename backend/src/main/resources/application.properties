spring.application.name=my-backend

# ── Datasource (H2 for local dev; set DATABASE_URL for PostgreSQL in production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:petmanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# ── JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── H2 console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT
jwt.secret=${JWT_SECRET:dev-secret-key-for-local-only-change-in-prod!!}
jwt.expiry-seconds=${JWT_EXPIRY_SECONDS:3600}

# ── BCrypt
security.bcrypt.strength=${BCRYPT_STRENGTH:12}

# ── Mail (configure MAIL_HOST etc. via environment variables)
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Application
app.base-url=${APP_BASE_URL:http://localhost:5173}
